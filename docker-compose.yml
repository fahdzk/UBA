
version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: uba-postgres
    environment:
      POSTGRES_USER: uba
      POSTGRES_PASSWORD: uba_password
      POSTGRES_DB: uba
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: uba-redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
